    <style>
      :root {
        --bg: #f8f7f3;
        --surface: #ffffff;
        --text: #152033;
        --muted: #5b6472;
        --line: #dfe3ea;
        --brand: #123c7a;
        --brand-dark: #0d2d5c;
        --accent: #f0b84b;
        --shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
        --radius: 22px;
        --max: 1120px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .container {
        width: min(var(--max), calc(100% - 32px));
        margin: 0 auto;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(12px);
        background: rgba(248, 247, 243, 0.88);
        border-bottom: 1px solid rgba(223, 227, 234, 0.8);
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 72px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-title {
        font-size: 1.05rem;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .header-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .language-switcher {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .language-button {
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        padding: 0;
      }

      .language-button.active {
        color: var(--brand);
        font-weight: 700;
      }

      .language-separator {
        color: #a0a8b4;
      }

      .nav-cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--brand);
        color: #fff;
        padding: 12px 18px;
        font-weight: 700;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 64px 0 30px;
      }

      .hero-single {
        max-width: 820px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero-copy {
        padding: 42px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        background: #eef4ff;
        color: var(--brand);
        font-weight: 700;
        font-size: 0.92rem;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.4rem, 5vw, 4.5rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .hero-copy p {
        margin: 0 0 16px;
        font-size: 1.08rem;
        color: var(--muted);
      }

      .hero-copy strong {
        color: var(--text);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 28px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 20px;
        border-radius: 999px;
        font-weight: 700;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      .section {
        padding: 20px 0 24px;
      }

      .section-inner {
        padding: 36px;
      }

        line-height: 1.08;
        letter-spacing: -0.03em;

        margin: 0 0 28px;
        color: var(--muted);
        font-size: 1.04rem;
        max-width: 760px;
      }

      .principle {
        padding: 24px 0;
        border-top: 1px solid var(--line);
      }

      .principle:first-of-type {
        border-top: 0;
        padding-top: 10px;
      }

      .principle h3 {
        margin: 0 0 12px;
        font-size: clamp(1.15rem, 2.4vw, 1.45rem);
        line-height: 1.25;

        color: var(--muted);
      }

      .principle ul {
        margin: 10px 0 12px;
        padding-left: 20px;
        color: var(--muted);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .feature,
      .callout {
        padding: 26px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #fff;
      }

      .feature h3,
      .callout h3 {
        margin: 0 0 10px;
        font-size: 1.15rem;
      }

      .feature p,
      .callout p,
      .callout li {
        margin: 0;
        color: var(--muted);
      }

      .feature ul {
        margin: 14px 0 0;
        padding-left: 18px;
        color: var(--muted);
      }

      .callout ul {
        margin: 14px 0 0;
        padding-left: 18px;
      }

      .quote {
        margin-top: 22px;
        padding: 22px 24px;
        border-left: 5px solid var(--accent);
        background: #fff9ed;
        border-radius: 16px;
        font-size: 1.05rem;
      }

      .meeting-contact-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 0;
        margin-bottom: 16px;
      }

      .footnote {
        font-size: 0.92rem;
        color: var(--muted);
      }

      .footer {
        padding: 32px 0 88px;
      }

      .footer-inner {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .mobile-contact-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        display: none;
        align-items: center;
        justify-content: space-around;
        gap: 8px;
        background: rgba(15, 47, 47, 0.97);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
        z-index: 9999;
        box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.18);
      }

        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        min-width: 88px;
        text-align: center;
      }

      @media (max-width: 960px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }

        .hero-copy,
        .section-inner {
          padding: 26px;
        }

        .hero {
          padding-top: 28px;
        }
      }

      @media (max-width: 767px) {
        .mobile-contact-bar {
          display: flex;
        }
      }

      @media (max-width: 640px) {
        .container {
          width: min(var(--max), calc(100% - 20px));
        }

        .nav {
          min-height: 64px;
          align-items: flex-start;
          padding: 14px 0;
        }

        .header-actions {
          width: 100%;
          align-items: stretch;
        }

        .language-switcher {
          justify-content: flex-start;
        }

        .nav-cta,
        .btn {
          width: 100%;
        }

        .hero-actions,
        .meeting-contact-actions {
          flex-direction: column;
        }

        .footer {
          padding-bottom: 108px;
        }
      }
    </style>
  </head>
